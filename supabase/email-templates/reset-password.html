<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset password — Haidiho</title>
</head>
<body style="margin:0;padding:0;background-color:#f2dfc6;font-family:Georgia,'Times New Roman',serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f2dfc6;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;">
          <tr>
            <td style="padding:0 0 16px;text-align:center;">
              <img src="{{ .SiteURL }}/images/haidiho-wordmark-transparent.png" alt="Haidiho" width="220" style="display:inline-block;max-width:220px;height:auto;border:0;" />
            </td>
          </tr>
          <tr>
            <td style="background-color:#fff6e8;border:1px solid #ead8c2;border-radius:20px;padding:28px 24px;">
              <p style="margin:0 0 8px;font-family:Arial,Helvetica,sans-serif;font-size:11px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:#4a90d9;">haidiho.com</p>
              <h1 style="margin:0 0 16px;font-family:Georgia,serif;font-size:28px;font-weight:700;color:#2d2d2d;">Reset your password</h1>
              <p style="margin:0 0 20px;font-family:Arial,Helvetica,sans-serif;font-size:16px;line-height:1.55;color:#5c5c5c;">
                Someone asked to reset the password for <strong>{{ .Email }}</strong>. If it was you, use the button below.
              </p>
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto;">
                <tr>
                  <td align="center" style="border-radius:12px;background-color:#0867e8;box-shadow:0 6px 0 #1e40af;">
                    <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;padding:14px 28px;font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:800;color:#fff8f0;text-decoration:none;">Reset password</a>
                  </td>
                </tr>
              </table>
              <p style="margin:20px 0 0;font-family:Arial,Helvetica,sans-serif;font-size:13px;color:#5c5c5c;">
                Didn't ask for this? Ignore this email.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
