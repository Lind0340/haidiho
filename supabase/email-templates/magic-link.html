<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — Haidiho</title>
</head>
<body style="margin:0;padding:0;background-color:#f2dfc6;font-family:Georgia,'Times New Roman',serif;">
  <div style="display:none;max-height:0;overflow:hidden;opacity:0;">Your Haidiho sign-in link — tap to come back.</div>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f2dfc6;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;">
          <tr>
            <td style="padding:0 0 16px;text-align:center;">
              <img src="{{ .SiteURL }}/images/haidiho-wordmark-transparent.png" alt="Haidiho" width="220" style="display:inline-block;max-width:220px;height:auto;border:0;" />
            </td>
          </tr>
          <tr>
            <td style="background-color:#fff6e8;border:1px solid #ead8c2;border-radius:20px;padding:28px 24px;box-shadow:0 12px 26px rgba(45,45,45,0.08);">
              <p style="margin:0 0 8px;font-family:Arial,Helvetica,sans-serif;font-size:11px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:#4a90d9;">haidiho.com</p>
              <h1 style="margin:0 0 16px;font-family:Georgia,serif;font-size:28px;font-weight:700;line-height:1.2;color:#2d2d2d;">Your sign-in link</h1>
              <p style="margin:0 0 12px;font-family:Arial,Helvetica,sans-serif;font-size:16px;line-height:1.55;color:#5c5c5c;">
                Tap below to sign in to Haidiho as <strong>{{ .Email }}</strong>. This link expires soon.
              </p>
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:28px auto 8px;">
                <tr>
                  <td align="center" style="border-radius:12px;background-color:#0867e8;box-shadow:0 6px 0 #1e40af;">
                    <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;padding:14px 28px;font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:800;color:#fff8f0;text-decoration:none;border-radius:12px;">Sign in ☕</a>
                  </td>
                </tr>
              </table>
              <p style="margin:16px 0 0;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:1.5;color:#5c5c5c;word-break:break-all;">
                Or copy this link:<br />
                <a href="{{ .ConfirmationURL }}" style="color:#0867e8;">{{ .ConfirmationURL }}</a>
              </p>
              <p style="margin:20px 0 0;font-family:Arial,Helvetica,sans-serif;font-size:13px;line-height:1.5;color:#5c5c5c;">
                Didn't request this? Ignore this email.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 8px 0;text-align:center;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:1.5;color:#5c5c5c;">
              <p style="margin:0;">— Hai &amp; DiHo ❤️</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
